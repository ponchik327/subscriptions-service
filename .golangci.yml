version: "2"

run:
  timeout: 5m
  build-tags:
    - integration
    - e2e

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - revive
    - gocritic
    - gosec
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - errorlint
    - sqlclosecheck
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - gosec
          - errcheck
          - errorlint
          - unparam

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ponchik327/subscriptions-service

issues:
  max-issues-per-linter: 0
  max-same-issues: 0